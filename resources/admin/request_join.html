<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Zone Vault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* === THEME VARIABLES === */
    :root {
        --bg-color: #050505;
        --text-main: #ffffff;
        --text-muted: #a1a1aa;
        --card-bg: #121212;
        --glass-border: 1px solid rgba(255, 255, 255, 0.08);
        --accent-approve: #22c55e;
        --accent-decline: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* Backgrounds */
    .bg-gradient {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
      background: radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.05), transparent 40%);
    }
    .noise-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      z-index: -1; pointer-events: none;
    }

    /* Typography & Header */
    header { text-align: center; margin-bottom: 40px; width: 100%; }
    h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
    p.subtitle { color: var(--text-muted); font-size: 16px; word-wrap: break-word; }

    /* Layout Grids */
    .requests-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1100px;
    }

    /* Cards */
    .request-card {
      background: var(--card-bg);
      border: var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      transition: transform 0.2s;
      animation: popIn 0.4s ease forwards;
    }
    .request-card:hover { transform: translateY(-3px); }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(234, 179, 8, 0.2);
      color: #eab308;
      margin-bottom: 16px;
    }

    .info-row { margin-bottom: 12px; font-size: 14px; }
    .info-row span.label { color: var(--text-muted); display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px;}
    .info-row span.value { color: var(--text-main); font-weight: 500; word-break: break-all; }

    /* Buttons */
    .btn-group { display: flex; gap: 10px; margin-top: 24px; }
    .btn {
      flex: 1; padding: 14px; border-radius: 12px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer; color: white;
      transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn-approve { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--accent-approve); color: var(--accent-approve); }
    .btn-approve:hover { background: var(--accent-approve); color: #000; }
    
    .btn-decline { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--accent-decline); color: var(--accent-decline); }
    .btn-decline:hover { background: var(--accent-decline); color: #fff; }
    
    .btn-cancel { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); }
    .btn-cancel:hover { background: rgba(255, 255, 255, 0.1); }
    .btn:disabled { opacity: 0.6; pointer-events: none; }

    /* Empty States */
    .empty-state { text-align: center; color: var(--text-muted); grid-column: 1 / -1; padding: 40px; }
    .empty-state i { font-size: 40px; margin-bottom: 15px; opacity: 0.5; }
    .error-text { color: var(--accent-decline); margin-top: 10px; }

    /* Modal Styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px);
      display: flex; justify-content: center; align-items: center;
      z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    
    .modal-card {
      background: var(--card-bg); border: var(--glass-border);
      border-radius: 24px; padding: 35px 30px; width: 90%; max-width: 400px;
      text-align: center; transform: scale(0.95) translateY(10px); 
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .modal-overlay.active .modal-card { transform: scale(1) translateY(0); }
    
    .modal-icon { font-size: 3rem; margin-bottom: 15px; display: block; }
    .modal-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
    .modal-text { color: var(--text-muted); font-size: 15px; margin-bottom: 25px; line-height: 1.5; }

    /* =========================================
       MOBILE OPTIMIZATIONS
       ========================================= */
    @media (max-width: 600px) {
      body { padding: 20px 15px; }
      h1 { font-size: 26px; }
      .requests-grid { grid-template-columns: 1fr; gap: 16px; }
      .request-card { padding: 20px; }
      .btn-group { flex-direction: column; gap: 12px; }
      .btn { padding: 16px; } 
      .modal-card { padding: 30px 20px; }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="noise-overlay"></div>
  
  <div id="root" style="width: 100%; max-width: 1100px; display: flex; flex-direction: column; align-items: center;"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAs2S6iRhnYhmqNuF0QCCYu5NuzxHxIRv0",
      authDomain: "tvnstream-b4497.firebaseapp.com",
      databaseURL: "https://tvnstream-b4497-default-rtdb.firebaseio.com",
      projectId: "tvnstream-b4497",
      storageBucket: "tvnstream-b4497.appspot.com",
      messagingSenderId: "308384754214",
      appId: "1:308384754214:web:2938e76cd29b288f75d4e7"
    };

    // Make Firebase available globally for React
    const app = initializeApp(firebaseConfig);
    window.db = getDatabase(app);
    window.auth = getAuth(app);
    window.fbRef = ref;
    window.fbOnValue = onValue;
    window.fbUpdate = update;
    window.fbOnAuthStateChanged = onAuthStateChanged;

    // Signal that Firebase is ready
    window.firebaseIsReady = true;
    if (typeof window.mountReactApp === 'function') {
      window.mountReactApp();
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function AdminDashboard() {
      const [user, setUser] = useState(null);
      const [requests, setRequests] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [modal, setModal] = useState({
        isOpen: false,
        uid: null,
        status: null,
        processing: false
      });

      // Handle Authentication & Realtime Data
      useEffect(() => {
        // We use window.auth because we injected it from the module script above
        const unsubscribe = window.fbOnAuthStateChanged(window.auth, (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
            loadRequests();
          } else {
            setUser(null);
            setLoading(false);
          }
        });
        return () => unsubscribe();
      }, []);

      const loadRequests = () => {
        const reqRef = window.fbRef(window.db, "joinRequests");
        window.fbOnValue(reqRef, (snapshot) => {
          const data = snapshot.val();
          if (data) {
            // Convert object to array and filter pending
            const pendingReqs = Object.entries(data)
              .map(([uid, req]) => ({ uid, ...req }))
              .filter(req => req.status === "pending");
            setRequests(pendingReqs);
          } else {
            setRequests([]);
          }
          setLoading(false);
          setError(null);
        }, (err) => {
          console.error("Firebase Error:", err);
          setError("Permission Denied. Your UID is not authorized as an Admin in the Firebase Rules.");
          setLoading(false);
        });
      };

      // Modal Actions
      const openModal = (uid, status) => {
        setModal({ isOpen: true, uid, status, processing: false });
      };

      const closeModal = () => {
        if (!modal.processing) {
          setModal({ ...modal, isOpen: false });
        }
      };

      const confirmAction = () => {
        setModal({ ...modal, processing: true });
        
        const userRequestRef = window.fbRef(window.db, `joinRequests/${modal.uid}`);
        window.fbUpdate(userRequestRef, { status: modal.status })
          .then(() => {
            // Success! The Realtime listener will automatically remove the card
            closeModal();
          })
          .catch((err) => {
            console.error("Error updating status:", err);
            alert("An error occurred. Check the console.");
            setModal({ ...modal, processing: false });
          });
      };

      // --- UI Render ---
      return (
        <React.Fragment>
          <header>
            <h1>Admin Dashboard</h1>
            <p className="subtitle">
              {user ? (
                <span>Logged in as Admin: <strong>{user.email}</strong></span>
              ) : (
                "Review pending access requests to Zone Vault"
              )}
            </p>
          </header>

          <div className="requests-grid">
            {/* Not Logged In */}
            {!user && !loading && (
              <div className="empty-state">
                <i className="fas fa-lock"></i>
                <p>You must be logged in to view this page.</p>
                <p className="error-text">Please go back to the Register/Login page and sign in first.</p>
              </div>
            )}

            {/* Loading Data */}
            {user && loading && (
              <div className="empty-state">
                <i className="fas fa-spinner fa-spin"></i>
                <p>Authenticating & Loading requests...</p>
              </div>
            )}

            {/* Permission Error */}
            {error && (
              <div className="empty-state">
                <i className="fas fa-exclamation-triangle" style={{ color: 'var(--accent-decline)' }}></i>
                <p>Access Blocked</p>
                <p className="error-text">{error}</p>
              </div>
            )}

            {/* Empty List */}
            {user && !loading && !error && requests.length === 0 && (
              <div className="empty-state">
                <i className="fas fa-check-circle" style={{ color: '#22c55e' }}></i>
                <p>All caught up! No pending requests right now.</p>
              </div>
            )}

            {/* Request Cards */}
            {user && !loading && !error && requests.map(req => (
              <div key={req.uid} className="request-card">
                <div className="badge">Pending Review</div>
                
                <div className="info-row">
                  <span className="label">Telegram Username / Name</span>
                  <span className="value">
                    <i className="fab fa-telegram-plane" style={{ marginRight: '5px', color: 'var(--text-muted)' }}></i>
                    {req.name}
                  </span>
                </div>
                
                <div className="info-row">
                  <span className="label">Email Address</span>
                  <span className="value">{req.email}</span>
                </div>

                <div className="info-row">
                  <span className="label">Access Code / Reason</span>
                  <span className="value">
                    <i className="fas fa-key" style={{ marginRight: '5px', color: 'var(--text-muted)' }}></i>
                    {req.reason}
                  </span>
                </div>

                <div className="info-row" style={{ marginTop: '15px', borderTop: '1px solid rgba(255,255,255,0.05)', paddingTop: '10px' }}>
                  <span className="label">User ID (UID)</span>
                  <span className="value" style={{ fontSize: '11px', fontFamily: 'monospace', color: 'var(--text-muted)' }}>
                    {req.uid}
                  </span>
                </div>

                <div className="btn-group">
                  <button className="btn btn-decline" onClick={() => openModal(req.uid, 'denied')}>
                    <i className="fas fa-times"></i> Decline
                  </button>
                  <button className="btn btn-approve" onClick={() => openModal(req.uid, 'approved')}>
                    <i className="fas fa-check"></i> Approve
                  </button>
                </div>
              </div>
            ))}
          </div>

          {/* Dynamic React Modal */}
          <div className={`modal-overlay ${modal.isOpen ? 'active' : ''}`}>
            <div className="modal-card">
              <i 
                className={`modal-icon ${modal.status === 'approved' ? 'fas fa-check-circle' : 'fas fa-times-circle'}`} 
                style={{ color: modal.status === 'approved' ? 'var(--accent-approve)' : 'var(--accent-decline)' }}
              ></i>
              <h3 className="modal-title">
                {modal.status === 'approved' ? 'Approve Request' : 'Decline Request'}
              </h3>
              <p className="modal-text">
                {modal.status === 'approved' 
                  ? "Are you sure you want to grant this user access to the Vault?" 
                  : "Are you sure you want to deny this user's request?"}
              </p>
              
              <div className="btn-group">
                <button className="btn btn-cancel" onClick={closeModal} disabled={modal.processing}>Cancel</button>
                <button 
                  className={`btn ${modal.status === 'approved' ? 'btn-approve' : 'btn-decline'}`} 
                  onClick={confirmAction}
                  disabled={modal.processing}
                >
                  {modal.processing ? (
                    <React.Fragment><i className="fas fa-spinner fa-spin"></i> Processing...</React.Fragment>
                  ) : (
                    modal.status === 'approved' ? 'Yes, Approve' : 'Yes, Decline'
                  )}
                </button>
              </div>
            </div>
          </div>

        </React.Fragment>
      );
    }

    // This function guarantees React only mounts after Babel compiles it
    window.mountReactApp = () => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<AdminDashboard />);
    };

    // If Firebase module finished first, trigger the mount now
    if (window.firebaseIsReady) {
      window.mountReactApp();
    }
  </script>

</body>
</html>
