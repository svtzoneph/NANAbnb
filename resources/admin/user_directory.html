<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Directory | Zone Vault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* === THEME VARIABLES === */
    :root {
        --bg-color: #050505;
        --text-main: #ffffff;
        --text-muted: #a1a1aa;
        --card-bg: #121212;
        --glass-border: 1px solid rgba(255, 255, 255, 0.08);
        --input-bg: rgba(255, 255, 255, 0.05);
        --accent-approve: #22c55e;
        --accent-decline: #ef4444;
        --accent-blue: #38bdf8;
        --accent-pending: #f59e0b;
        --sidebar-width: 280px; 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background Effects */
    .bg-gradient {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
      background: radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.05), transparent 40%);
    }
    .noise-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      z-index: -1; pointer-events: none;
    }

    /* TOP NAV & SIDEBAR STYLES */
    .top-nav { width: 100%; padding: 20px 25px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 999; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(15px); border-bottom: var(--glass-border); }
    .menu-trigger { font-size: 22px; cursor: pointer; color: var(--text-main); padding: 5px; }
    .logo { font-weight: 700; letter-spacing: -0.5px; font-size: 20px; }

    .sidebar { position: fixed; top: 0; left: -100%; width: var(--sidebar-width); height: 100%; background: var(--card-bg); border-right: var(--glass-border); z-index: 1001; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 40px 20px; }
    .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
    .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; }
    .sidebar-overlay.active { opacity: 1; visibility: visible; }

    .nav-btn { width: 100%; padding: 16px 20px; border-radius: 12px; color: var(--text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; border: 1px solid transparent; background: transparent; font-size: 15px; text-decoration: none; }
    .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.05); color: var(--text-main); border-color: rgba(255,255,255,0.1); }
    .nav-btn i { font-size: 18px; width: 20px; text-align: center; }

    /* MAIN CONTENT */
    .main-content {
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px; width: 100%; max-width: 1100px; margin: 0 auto;
    }

    header { position: relative; text-align: center; margin-bottom: 30px; width: 100%; }
    h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
    
    .diagnostic-box {
      background: rgba(255,255,255,0.03); border: var(--glass-border); border-radius: 12px;
      padding: 10px 20px; display: inline-flex; align-items: center; gap: 10px; margin-top: 10px;
    }
    .diagnostic-box p { margin: 0; font-size: 14px; color: var(--text-muted); }
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
    .status-admin { background: rgba(34, 197, 94, 0.2); color: var(--accent-approve); }
    .status-user { background: rgba(239, 68, 68, 0.2); color: var(--accent-decline); }
    
    .badge-approved { background: rgba(34, 197, 94, 0.15); color: var(--accent-approve); border: 1px solid rgba(34, 197, 94, 0.3); }
    .badge-pending { background: rgba(245, 158, 11, 0.15); color: var(--accent-pending); border: 1px solid rgba(245, 158, 11, 0.3); }
    .badge-rejected { background: rgba(239, 68, 68, 0.15); color: var(--accent-decline); border: 1px solid rgba(239, 68, 68, 0.3); }

    /* Controls: Search & Tabs */
    .controls-container {
      width: 100%; display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; align-items: center;
    }

    .search-wrapper {
      position: relative; width: 100%; max-width: 600px;
    }
    .search-wrapper i {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 18px;
    }
    .search-input {
      width: 100%; padding: 16px 20px 16px 50px; background: rgba(255, 255, 255, 0.03);
      border: var(--glass-border); border-radius: 50px; color: var(--text-main); font-size: 16px;
      outline: none; transition: 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .search-input:focus { border-color: rgba(255,255,255,0.2); background: rgba(255, 255, 255, 0.06); }

    .tabs {
      display: flex; background: rgba(255, 255, 255, 0.03); border: var(--glass-border);
      border-radius: 50px; padding: 5px; gap: 5px;
    }
    .tab-btn {
      padding: 10px 25px; border: none; background: transparent; color: var(--text-muted);
      border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s;
    }
    .tab-btn.active { background: var(--text-main); color: #000; box-shadow: 0 2px 10px rgba(255,255,255,0.2); }
    .tab-btn:hover:not(.active) { color: var(--text-main); background: rgba(255,255,255,0.05); }

    /* Directory Grid */
    .directory-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; width: 100%;
    }

    .info-card {
      background: var(--card-bg); border: var(--glass-border); border-radius: 20px;
      padding: 20px; box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      display: flex; flex-direction: column; gap: 15px; animation: popIn 0.4s ease forwards;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card-header-flex { display: flex; align-items: center; gap: 15px; }
    
    .profile-pic {
      width: 55px; height: 55px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); flex-shrink: 0;
    }
    .avatar-placeholder {
      width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: var(--text-muted); flex-shrink: 0;
    }

    .user-primary-info { display: flex; flex-direction: column; overflow: hidden; }
    .info-name { font-size: 18px; font-weight: 700; color: var(--text-main); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .info-email { font-size: 13px; color: var(--text-muted); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

    .card-details {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px;
    }
    .detail-row { display: flex; flex-direction: column; gap: 2px; }
    .detail-label { font-size: 11px; text-transform: uppercase; color: rgba(255,255,255,0.4); font-weight: 600; letter-spacing: 0.5px; }
    .detail-value { font-size: 13px; color: var(--text-main); word-break: break-all; }
    .detail-value.uid-font { font-family: monospace; color: var(--accent-blue); }

    .empty-state { text-align: center; color: var(--text-muted); padding: 60px 20px; width: 100%; grid-column: 1 / -1; }
    .empty-state i { font-size: 40px; margin-bottom: 15px; opacity: 0.5; }

    @media (max-width: 600px) {
      .main-content { padding: 30px 15px; }
      h1 { font-size: 26px; } 
      .directory-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="noise-overlay"></div>
  
  <div id="root" style="width: 100%;"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, onValue, off } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAs2S6iRhnYhmqNuF0QCCYu5NuzxHxIRv0",
      authDomain: "tvnstream-b4497.firebaseapp.com",
      databaseURL: "https://tvnstream-b4497-default-rtdb.firebaseio.com",
      projectId: "tvnstream-b4497",
      storageBucket: "tvnstream-b4497.appspot.com",
      messagingSenderId: "308384754214",
      appId: "1:308384754214:web:2938e76cd29b288f75d4e7",
    };

    const app = initializeApp(firebaseConfig);
    window.db = getDatabase(app);
    window.auth = getAuth(app);
    window.fbRef = ref;
    window.fbOnValue = onValue;
    window.fbOff = off;
    window.fbOnAuthStateChanged = onAuthStateChanged;

    window.firebaseIsReady = true;
    if (typeof window.mountReactApp === 'function') window.mountReactApp();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function UserDirectoryApp() {
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [isAdmin, setIsAdmin] = useState(false);
      
      const [usersData, setUsersData] = useState({});
      const [requestsData, setRequestsData] = useState({});
      
      const [searchTerm, setSearchTerm] = useState("");
      const [activeTab, setActiveTab] = useState("users"); // 'users' or 'requests'

      useEffect(() => {
        const unsubscribeAuth = window.fbOnAuthStateChanged(window.auth, (currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            const myProfileRef = window.fbRef(window.db, `users/${currentUser.uid}`);
            window.fbOnValue(myProfileRef, (snap) => {
              const myData = snap.val();
              if (myData && myData.role === 'admin') {
                setIsAdmin(true);
                
                // Fetch Users Node
                const usersRef = window.fbRef(window.db, 'users');
                window.fbOnValue(usersRef, (usersSnap) => {
                  setUsersData(usersSnap.val() || {});
                });

                // Fetch Join Requests Node
                const requestsRef = window.fbRef(window.db, 'joinRequests');
                window.fbOnValue(requestsRef, (reqSnap) => {
                  setRequestsData(reqSnap.val() || {});
                });

              } else {
                setIsAdmin(false);
              }
              setAuthLoading(false);
            });
          } else {
            setAuthLoading(false);
            setIsAdmin(false);
          }
        });
        return () => unsubscribeAuth();
      }, []);

      // Filter Logic for Users
      const filteredUsers = useMemo(() => {
        const searchLower = searchTerm.toLowerCase();
        return Object.entries(usersData)
          .map(([uid, data]) => ({ uid, ...data }))
          .filter(u => {
             const matchName = (u.name || "").toLowerCase().includes(searchLower);
             const matchEmail = (u.email || "").toLowerCase().includes(searchLower);
             const matchUid = u.uid.toLowerCase().includes(searchLower);
             return matchName || matchEmail || matchUid;
          });
      }, [usersData, searchTerm]);

      // Filter Logic for Join Requests
      const filteredRequests = useMemo(() => {
        const searchLower = searchTerm.toLowerCase();
        return Object.entries(requestsData)
          .map(([uid, data]) => ({ uid, ...data }))
          .filter(r => {
             const matchName = (r.name || "").toLowerCase().includes(searchLower);
             const matchEmail = (r.email || "").toLowerCase().includes(searchLower);
             const matchUid = r.uid.toLowerCase().includes(searchLower);
             const matchReason = (r.reason || "").toLowerCase().includes(searchLower);
             return matchName || matchEmail || matchUid || matchReason;
          });
      }, [requestsData, searchTerm]);

      // Helper to colorize status badges
      const getStatusBadge = (status) => {
        const statLower = (status || "").toLowerCase();
        if (statLower === 'approved') return 'badge-approved';
        if (statLower === 'rejected') return 'badge-rejected';
        return 'badge-pending';
      };

      return (
        <React.Fragment>
          {/* TOP NAV */}
          <nav className="top-nav">
            <div className="menu-trigger" onClick={() => setSidebarOpen(true)}>
              <i className="fas fa-bars-staggered"></i>
            </div>
            <div className="logo">ZONE VAULT</div>
            <div style={{width: '24px'}}></div>
          </nav>

          {/* SIDEBAR */}
          <div className={`sidebar-overlay ${sidebarOpen ? 'active' : ''}`} onClick={() => setSidebarOpen(false)}></div>
          <aside className={`sidebar ${sidebarOpen ? 'active' : ''}`}>
            <div style={{ marginBottom: '40px', paddingLeft: '15px' }}>
              <h3 style={{ fontSize: '22px', fontWeight: '700' }}>Admin Panel</h3>
              <p style={{ fontSize: '13px', color: 'var(--text-muted)' }}>Management Suite</p>
            </div>
            <a href="panel" className="nav-btn"><i className="fas fa-house"></i><span>Admin Home</span></a>
            <a href="request_join" className="nav-btn"><i className="fas fa-user-plus"></i><span>Request Join</span></a>
            <a href="generator" className="nav-btn"><i className="fas fa-key"></i><span>Access Codes</span></a>
            <a href="page_access" className="nav-btn"><i className="fas fa-shield-halved"></i><span>Page Access</span></a>
            <a href="watch_history" className="nav-btn"><i className="fas fa-history"></i><span>Watch History</span></a>
            {/* Added current page to sidebar */}
            <a href="user_directory" className="nav-btn active"><i className="fas fa-address-book"></i><span>User Directory</span></a>
          </aside>

          {/* MAIN CONTENT */}
          <main className="main-content">
            <header>
              <h1>User Directory</h1>
              <div className="diagnostic-box">
                {authLoading ? (
                   <p><i className="fas fa-spinner fa-spin"></i> Checking credentials...</p>
                ) : user ? (
                   <p>
                     <i className="fas fa-user-shield"></i> {user.email}
                     <span className={`status-badge ${isAdmin ? 'status-admin' : 'status-user'}`} style={{marginLeft: '8px'}}>
                       {isAdmin ? 'ADMIN' : 'NO ACCESS'}
                     </span>
                   </p>
                ) : (
                   <p style={{color: "var(--accent-decline)"}}><i className="fas fa-lock"></i> Not logged in.</p>
                )}
              </div>
            </header>

            {isAdmin && (
              <div className="controls-container">
                {/* Search Bar */}
                <div className="search-wrapper">
                  <i className="fas fa-search"></i>
                  <input 
                    type="text" 
                    className="search-input" 
                    placeholder="Search by name, email, or UID..." 
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                </div>

                {/* Tabs */}
                <div className="tabs">
                  <button 
                    className={`tab-btn ${activeTab === 'users' ? 'active' : ''}`}
                    onClick={() => setActiveTab('users')}
                  >
                    <i className="fas fa-users" style={{marginRight: '8px'}}></i>
                    Registered Users ({filteredUsers.length})
                  </button>
                  <button 
                    className={`tab-btn ${activeTab === 'requests' ? 'active' : ''}`}
                    onClick={() => setActiveTab('requests')}
                  >
                    <i className="fas fa-envelope-open-text" style={{marginRight: '8px'}}></i>
                    Join Requests ({filteredRequests.length})
                  </button>
                </div>
              </div>
            )}

            {isAdmin && activeTab === 'users' && (
              <div className="directory-grid">
                {filteredUsers.length === 0 ? (
                  <div className="empty-state">
                    <i className="fas fa-user-slash"></i>
                    <h2>No Users Found</h2>
                    <p>Try adjusting your search term.</p>
                  </div>
                ) : (
                  filteredUsers.map((u) => (
                    <div className="info-card" key={u.uid}>
                      <div className="card-header-flex">
                        {u.profilePicture ? (
                          <img src={u.profilePicture} alt={u.name} className="profile-pic" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}/>
                        ) : null}
                        {/* Fallback avatar if image is missing or fails to load */}
                        <div className="avatar-placeholder" style={{ display: u.profilePicture ? 'none' : 'flex' }}>
                          <i className="fas fa-user"></i>
                        </div>
                        
                        <div className="user-primary-info">
                          <span className="info-name" title={u.name}>{u.name || 'Unknown Name'}</span>
                          <span className="info-email" title={u.email}>{u.email || 'No email provided'}</span>
                        </div>
                      </div>

                      <div className="card-details">
                        <div className="detail-row">
                          <span className="detail-label">User ID (UID)</span>
                          <span className="detail-value uid-font">{u.uid}</span>
                        </div>
                        {u.bio && (
                          <div className="detail-row" style={{marginTop: '5px'}}>
                            <span className="detail-label">Bio</span>
                            <span className="detail-value" style={{color: 'var(--text-muted)'}}>"{u.bio}"</span>
                          </div>
                        )}
                        {u.role && (
                          <div className="detail-row" style={{marginTop: '5px'}}>
                            <span className="detail-label">Role</span>
                            <span className={`status-badge ${u.role === 'admin' ? 'status-admin' : ''}`} style={{width: 'fit-content'}}>
                              {u.role}
                            </span>
                          </div>
                        )}
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {isAdmin && activeTab === 'requests' && (
              <div className="directory-grid">
                {filteredRequests.length === 0 ? (
                  <div className="empty-state">
                    <i className="fas fa-inbox"></i>
                    <h2>No Requests Found</h2>
                    <p>No matching join requests found.</p>
                  </div>
                ) : (
                  filteredRequests.map((r) => (
                    <div className="info-card" key={r.uid}>
                      <div className="card-header-flex" style={{justifyContent: 'space-between'}}>
                         <div className="user-primary-info">
                          <span className="info-name" title={r.name}>{r.name || 'Unknown'}</span>
                          <span className="info-email" title={r.email}>{r.email || 'No email provided'}</span>
                        </div>
                        <span className={`status-badge ${getStatusBadge(r.status)}`}>
                          {r.status || 'Pending'}
                        </span>
                      </div>

                      <div className="card-details">
                        <div className="detail-row">
                          <span className="detail-label">User ID (UID)</span>
                          <span className="detail-value uid-font">{r.uid}</span>
                        </div>
                        <div className="detail-row" style={{marginTop: '5px'}}>
                          <span className="detail-label">Reason Code</span>
                          <span className="detail-value" style={{fontWeight: '500'}}>{r.reason || 'N/A'}</span>
                        </div>
                        <div className="detail-row" style={{marginTop: '5px'}}>
                          <span className="detail-label">Provider</span>
                          <span className="detail-value" style={{textTransform: 'capitalize', color: 'var(--text-muted)'}}>{r.provider || 'N/A'}</span>
                        </div>
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {!isAdmin && !authLoading && (
              <div className="empty-state">
                <i className="fas fa-shield-lock" style={{color: 'var(--accent-decline)'}}></i>
                <h2 style={{color: 'var(--accent-decline)'}}>Access Denied</h2>
                <p>You need admin privileges to view the directory.</p>
              </div>
            )}

          </main>
        </React.Fragment>
      );
    }

    window.mountReactApp = () => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<UserDirectoryApp />);
    };
    if (window.firebaseIsReady) window.mountReactApp();
  </script>
</body>
</html>
